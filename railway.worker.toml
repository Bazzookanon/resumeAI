# Railway config for the QUEUE WORKER service.
# This must be a SEPARATE Railway service from the web one (same repo, same
# env vars), with its "Config-as-code path" (in Settings) set to this file.
# It's what actually processes ScreenResumeJob and calls Claude.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "php artisan queue:work --tries=3 --timeout=120 --sleep=3"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
