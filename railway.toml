# Railway config for the WEB service.
# Migrations + config caching run at deploy time (env vars are only available
# at runtime on Railway, not during the Nixpacks build), then the app serves.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"
healthcheckPath = "/up"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
