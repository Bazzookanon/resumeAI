# Build configuration for Railway's Nixpacks builder.
# Handles both the PHP/Composer side and the npm/Vite asset build.

[phases.setup]
nixPkgs = ["nodejs_20", "php83", "php83Packages.composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build"
]
