# Build configuration for Railway's Nixpacks builder.
# Handles both the PHP/Composer side and the npm/Vite asset build.

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build"
]
