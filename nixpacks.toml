# Build configuration for Railway's Nixpacks builder.
# Handles both the PHP/Composer side and the npm/Vite asset build.

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build"
]
